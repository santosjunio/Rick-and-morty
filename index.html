<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <p><a href="https://github.com/santosjunio">santosjunio</a></p>
        <img src="images/Vector.svg" alt="Logo do Github">
        
    </header>

    <main>
        <div>
            <img src="images/image 3.svg" alt="Rick Sanchez">
        </div>

        <div class="section-main">
            <img src="images/Group.svg" alt="Logo Rick and Morty">
            <h2>Bem-vindos ao <span>consumo de API</span> do Rick and Morty</h2>
            <p>Aqui você encontra informações sobre os personagens de Rick and Morty.</p>
           <nav class="btn">
                <ul>
                    <li>
                        <a href="" class="btn-primary">Veja agora</a>
                        <a href="" class="btn-secondary">Saiba mais</a>
                    </li>
                </ul>
           </nav>
        </div>
    </main>

    
    <!-------- Section Cards ------/-->
    <div class="section-info">
        <h2>Nossos <span>Personagens</span></h2>

        <div class="section-cards">
            <div class="cards">
                <img src="Rectangle 3.svg" alt="imagem do card">
                <h3>Rick and Morty</h3>
        </div>

        <footer>Desenvolvido por <span>Anderson Ferreira </span></footer>

</body>
